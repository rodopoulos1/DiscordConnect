<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conectando ao servidor...</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    p { font-size: 1.1rem; }
    a { color: #89b4fa; }
  </style>
</head>
<body>
  <p>Redirecionando para o servidor...</p>
  <p>Se não redirecionar automaticamente, <a id="link" href="#">clique aqui</a>.</p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const ip = params.get("ip");
    const port = params.get("port");

    if (ip && port) {
      const url = "steam://connect/" + ip + ":" + port;
      document.getElementById("link").href = url;
      window.location.href = url;
    } else {
      document.querySelector("p").textContent = "Parâmetros de conexão não encontrados.";
    }
  </script>
</body>
</html>
